# BACKGROUND
background {
    monitor =
    path = /home/rymond044/Wallpapers/current.jpg
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
    crossfade_time = 0.5
}

# GENERAL
general {
    hide_cursor = false
    ignore_empty_input = true
}

# ANIMATIONS
animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M%p")"
    color = rgba(240,243,220, 0.75)
    font_size = 140
    font_family = SF Pro Display Bold
    position = 0, -200
    halign = center
    valign = top
}

label {
    monitor =
    text = $LAYOUT
    color = rgba(240,243,220, 0.65)
    font_size = 25
    font_family = system-ui
    position = 0, -420
    halign = center
    valign = center
}

# DAY-DATE-MONTH
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date '+%A, %d %B')</span>"
    color = rgba(240,243,220, 0.65)
    font_size = 35
    font_family = system-ui
    position = 0, 400
    halign = center
    valign = center
}

image {
    monitor =
    path = ~/Pictures/pfp/current_pfp.jpg
    size = 250
    rounding = -1
    border_size = 4
    border_color = rgba(94,109,83, 1)
    position = 0, -100
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = Hello, $USER
    color = rgba(240,243,220, 0.65)
    font_size = 35
    font_family = system-ui
    position = 0, -260
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 320, 70
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0,1,0, 0)
    inner_color = rgba(0,1,0, 0.35)
    font_color = rgba(240,243,220, 1)
    fade_on_empty = false
    font_family = system-ui
    placeholder_text = <i><span foreground="##F0F3DC99">Password...</span></i>
    hide_input = false
    position = 0, -340
    halign = center
    valign = center
}
