###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, return, exec, $terminal
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod, M, exit,
unbind = $mainMod, M
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
unbind = $mainMod, V
bind = $mainMod SHIFT, V, togglefloating,
bind = $mainMod, Space, exec, $menu
bind = $mainMod, ESCAPE, exec, $powermenu
bind = $mainMod SHIFT, B, exec, $browser
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, F, fullscreen

# bind = CTRL, Space, exec, kando --trigger menu1


# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Переключение рабочих столов с mainMod + [0-9]
bind = $mainMod, 1, split-workspace, 1
bind = $mainMod, 2, split-workspace, 2
bind = $mainMod, 3, split-workspace, 3
bind = $mainMod, 4, split-workspace, 4
bind = $mainMod, 5, split-workspace, 5
bind = $mainMod, 6, split-workspace, 6
bind = $mainMod, 7, split-workspace, 7
bind = $mainMod, 8, split-workspace, 8
bind = $mainMod, 9, split-workspace, 9

# Перемещение окна на другой рабочий стол на ТЕКУЩЕМ мониторе
bind = $mainMod SHIFT, 1, split-movetoworkspace, 1
bind = $mainMod SHIFT, 2, split-movetoworkspace, 2
bind = $mainMod SHIFT, 3, split-movetoworkspace, 3
bind = $mainMod SHIFT, 4, split-movetoworkspace, 4
bind = $mainMod SHIFT, 5, split-movetoworkspace, 5
bind = $mainMod SHIFT, 6, split-movetoworkspace, 6
bind = $mainMod SHIFT, 7, split-movetoworkspace, 7
bind = $mainMod SHIFT, 8, split-movetoworkspace, 8
bind = $mainMod SHIFT, 9, split-movetoworkspace, 9


# bind = $mainMod, TAB, hyprexpo:expo, toggle

bind = SUPER, Tab, hyprtasking:toggle, all
# bind = ALT, Tab, overview:toggle, all

# Закрыть обзор кнопкой Escape, если он активен
bind = , escape, hyprtasking:if_active, hyprtasking:toggle cursor


# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

unbind = $mainMod, S
unbind = $mainMod SHIFT, S

#Screenshots
# Сделать скриншот всего экрана и сразу открыть в Swappy
bind = , Print, exec, $screenshot


# Скриншот выделенной области в буфер (Super + Print)
bind = $mainMod, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

#буфер обмена
bind = $mainMod, V, exec, $bufferman

#меню приложений
bind = $mainMod SHIFT, A, exec, $appMenu


# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindel = $mainMod, T, exec, $touchpadToggle


# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

unbindl = , XF86AudioNext
unbindl = , XF86AudioPause
unbindl = , XF86AudioPlay
unbindl = , XF86AudioPrev

#переключение треков
bind = $mainMod SHIFT, code:60, exec, playerctl next
bind = $mainMod SHIFT, code:59, exec, playerctl previous
bind = $mainMod Shift, code:61, exec, playerctl play-pause
